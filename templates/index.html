<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemio ERP 自然語言查詢</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background: #f0f2f5; }
    .brand-icon { font-size: 1.4rem; }
    .sql-pre {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: .5rem;
      padding: 1rem 1.2rem;
      font-family: "Consolas", "Courier New", monospace;
      font-size: .875rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .table-badge { cursor: pointer; }
    #result-area { min-height: 120px; }
    .placeholder-box {
      border: 2px dashed #dee2e6;
      border-radius: .75rem;
      color: #adb5bd;
    }
    .loading-overlay {
      text-align: center;
      padding: 3rem 1rem;
      background: #fff;
      border-radius: .75rem;
      border: 1px solid #dee2e6;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow-sm">
  <div class="container-lg">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-database-fill-gear brand-icon me-2"></i>Gemio ERP 自然語言查詢
    </span>
    <span class="text-white-50 small">
      <i class="bi bi-table me-1"></i>已載入 <strong class="text-white">{{ table_count }}</strong> 個資料表
    </span>
  </div>
</nav>

<div class="container-lg py-4">

  <!-- 區塊 1：輸入框 -->
  <div class="card shadow-sm mb-4">
    <div class="card-body p-4">
      <h6 class="text-muted mb-3"><i class="bi bi-chat-left-text me-1"></i>輸入查詢問題</h6>
      <form id="query-form"
            hx-post="/query"
            hx-target="#result-area"
            hx-swap="innerHTML"
            hx-on::before-request="showLoading()">
        <div class="input-group input-group-lg shadow-sm">
          <input id="q-input"
                 type="text"
                 name="question"
                 class="form-control"
                 placeholder="例如：列出所有採購訂單的未交量"
                 autocomplete="off"
                 required>
          <button class="btn btn-primary px-4" type="submit">
            <i class="bi bi-search"></i> 查詢
          </button>
        </div>
      </form>

      <!-- 快速範例 -->
      <div class="mt-3 d-flex flex-wrap gap-2 align-items-center">
        <small class="text-muted me-1">快速範例：</small>
        {% set examples = [
          "列出所有會計科目及其餘額",
          "有哪些採購訂單尚未交貨",
          "查詢採購金額最大的前10筆訂單",
          "各科目餘額加總是多少"
        ] %}
        {% for ex in examples %}
        <button type="button"
                class="btn btn-sm btn-outline-secondary"
                onclick="document.getElementById('q-input').value=this.dataset.q"
                data-q="{{ ex }}">{{ ex }}</button>
        {% endfor %}
      </div>
    </div>
  </div>

  <!-- 區塊 2：查詢結果 + SQL（由 result.html 注入） -->
  <div id="result-area">
    <div class="placeholder-box text-center py-5">
      <i class="bi bi-arrow-up-circle fs-1 d-block mb-2"></i>
      <span>輸入問題後，查詢結果將顯示於此</span>
    </div>
  </div>

  <!-- 區塊 3：可查詢的表 -->
  <div class="card shadow-sm mt-4">
    <div class="card-header d-flex justify-content-between align-items-center py-2">
      <span class="fw-semibold">
        <i class="bi bi-diagram-3 me-1"></i>可查詢的資料表（{{ table_count }} 個）
      </span>
      <button class="btn btn-sm btn-outline-secondary"
              hx-post="/refresh-schema"
              hx-swap="none"
              hx-on::after-request="handleRefresh(event)">
        <i class="bi bi-arrow-clockwise me-1"></i>更新 Schema
      </button>
    </div>
    <div class="card-body p-3">
      <div class="d-flex flex-wrap gap-1">
        {% for t in tables %}
        <span class="badge bg-light text-dark border table-badge"
              title="{{ t }}"
              onclick="document.getElementById('q-input').value='查詢 {{ t }} 的資料'">
          {{ t }}
        </span>
        {% endfor %}
      </div>
    </div>
  </div>

</div>

<script>
function showLoading() {
  document.getElementById('result-area').innerHTML = `
    <div class="loading-overlay">
      <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;" role="status"></div>
      <p class="fs-5 fw-semibold text-primary mb-1">系統查詢中，請稍候...</p>
      <p class="text-muted small">正在將您的問題轉換為 SQL 並執行查詢</p>
    </div>`;
}

function handleRefresh(evt) {
  const res = evt.detail.xhr;
  try {
    const data = JSON.parse(res.responseText);
    alert(data.message);
    if (data.success) location.reload();
  } catch {
    alert('Schema 更新完成，請重新整理頁面');
  }
}
</script>
</body>
</html>
